    @keyframes turboFanOpen {

    let albumSwitchToken = 0;
    let mvStagePlaying = false;
    let mvReady = false;
    const favorites = new Set();
    function setNavMode(mode) {
      nav.querySelectorAll("button[data-view]").forEach((button) => {
        const activeMode = button.dataset.view === mode;
        button.classList.toggle("active", activeMode);
        button.setAttribute("aria-pressed", String(activeMode));
      });
    }
    function flashFavorite() {
      app.classList.add("favorite-flash");
      window.clearTimeout(flashFavorite.timer);
      flashFavorite.timer = window.setTimeout(() => app.classList.remove("favorite-flash"), 520);
    }
    function handleNav(view) {
      if (view === "cover") {
        setTracksOpen(false);
        window.scrollTo({ top: 0, behavior: "smooth" });
        setNavMode("cover");
        return;
      }
      if (view === "albums") {
        setTracksOpen(false);
        librarySection.scrollIntoView({ behavior: "smooth", block: "start" });
        setNavMode("albums");
        return;
      }
      if (view === "tracks") {
        window.scrollTo({ top: 0, behavior: "smooth" });
        setTracksOpen(true, true);
        setNavMode("tracks");
        return;
      }
      if (view === "favorite") {
        const album = albums[active];
        if (favorites.has(album.title)) favorites.delete(album.title);
        else favorites.add(album.title);
        syncFavorite(album);
        flashFavorite();
        setNavMode("favorite");
      }
    }
    function syncFavorite(album) {
      const favored = favorites.has(album.title);
      favoriteBtn.setAttribute("aria-pressed", String(favored));
      favoriteBtn.textContent = favored ? "已收藏" : "收藏";
      renderRail();
    }
    function setTracksOpen(open, replay = false) {
      tracksOpen = false;
      window.clearTimeout(setTracksOpen.timer);
      app.classList.remove("tracks-open", "tracks-closing", "cover-tapped", "switching", "blank-returning", "track-previewing");
      app.classList.add("tracks-collapsed");
      if (replayCover) {
        replayCover.hidden = true;
        replayCover.setAttribute("aria-pressed", "false");
      }
      setNavMode("cover");
    }

    function toggleTracks() {
      setTracksOpen(!tracksOpen, true);
    }
    function albumSlug(album) {
      return album.cover.split("/").pop().replace(/\.jpg$/i, "");
    }
    function formatTime(seconds) {
      const safe = Number.isFinite(seconds) ? Math.max(0, Math.floor(seconds)) : 0;
      const minutes = Math.floor(safe / 60);
      const rest = String(safe % 60).padStart(2, "0");
      return `${minutes}:${rest}`;
    }
    function getTrack(album, index = activeTrack) {
      const title = album.tracks[index] || album.tracks[0];
      const duration = 208 + index;
      const stem = String(index + 1).padStart(2, "0");
      const slug = albumSlug(album);
      const audioSources = ["mp3", "flac", "m4a", "wav"].map((ext) => `assets/audio/${slug}/${stem}.${ext}`);
      const mvSources = ["mp4", "webm", "mov"].map((ext) => `assets/mv/${slug}/${stem}.${ext}`);
      const file = `${stem}.mp3`;
      const mvFile = `${stem}.mp4`;
      const src = audioSources[0];
      const mvSrc = mvSources[0];
      return { title, duration, src, file, mvSrc, mvFile, audioSources, mvSources };
    }    function getMvSources(album, index = activeTrack) {
      const fallback = getTrack(album, index).mvSources;
      if (Array.isArray(album.mv)) return album.mv.length ? album.mv.concat(fallback) : fallback;
      if (typeof album.mv === "string") return [album.mv].concat(fallback);
      return fallback;
    }
    function getMvSource(album, index = activeTrack) {
      return getMvSources(album, index)[0] || "";
    }    function syncMvStage(album, track) {
      if (!mvTitle || !mvAlbumLabel || !mvState) return;
      const source = getMvSource(album, activeTrack);
      mvAlbumLabel.textContent = `MV / ${album.title} · ${album.year}`;
      mvTitle.textContent = `${track.title} MV`;
      app.classList.toggle("mv-playing", playing || mvStagePlaying);
      mvPlayControl?.setAttribute("aria-pressed", String(playing || mvStagePlaying));
      if (!source) {
        mvReady = false;
        app.classList.remove("has-mv");
        mvState.textContent = "MV 待接入";
        if (mvVideo) {
          mvVideo.pause();
          mvVideo.removeAttribute("src");
          mvVideo.load();
        }
        return;
      }
      mvState.textContent = mvReady ? "本地 MV" : "正在接入 MV";
      if (!mvVideo || mvVideo.dataset.src === source) return;
      mvCandidateIndex = 0;
      mvReady = false;
      mvVideo.dataset.src = source;
      mvVideo.poster = album.cover;
      mvVideo.src = source;
      mvVideo.load();
    }
    function toggleMvPlayback(event) {
      event?.stopPropagation();
      mvStagePlaying = !mvStagePlaying;
      app.classList.toggle("mv-playing", mvStagePlaying || playing);
      mvPlayControl?.setAttribute("aria-pressed", String(mvStagePlaying || playing));
      if (!mvVideo || !mvReady) return;
      if (mvStagePlaying) mvVideo.play().catch(() => { mvState.textContent = "点击播放"; });
      else mvVideo.pause();
    }
    function setProgress(value) {
      app.style.setProperty("--audio-progress", String(Math.max(0, Math.min(1, value || 0))));
    }
    function preloadCovers() {
      albums.forEach((album) => {
        const image = new Image();
        image.decoding = "async";
        image.src = album.cover;
      });
    }
    function setLyricActive(index, quiet = false) {
      const next = (index + lyricNodes.length) % lyricNodes.length;
      app.style.setProperty("--lyric-active", String(next));
      lyricNodes.forEach((node, lyricIndex) => {
        node.style.setProperty("--lyric-index", String(lyricIndex));
        node.classList.toggle("current", lyricIndex === next);
      });
      if (quiet) return;
      app.classList.add("lyric-pulse");
      window.clearTimeout(lyricPulseTimer);
      lyricPulseTimer = window.setTimeout(() => app.classList.remove("lyric-pulse"), 1500);
    }
    function startLyricFlow() {
      window.clearInterval(lyricFlowTimer);
      lyricFlowTimer = window.setInterval(() => {
        if (tracksOpen || !playing || document.hidden) return;
        const current = lyricNodes.findIndex((node) => node.classList.contains("current"));
        setLyricActive((current < 0 ? 0 : current + 1) % lyricNodes.length);
      }, 3300);
    }
    function loadAudio(album, options = {}) {
      const track = getTrack(album, activeTrack);
      const shouldLoad = options.userGesture === true || options.autoContinue === true;
      if (!shouldLoad) {
        setProgress(0.04);
        app.classList.remove("has-audio");
        app.classList.add("audio-waiting");
        audioStatus.textContent = "点击播放接入音源";
        return track;
      }
      if (track.audioSources.includes(currentAudioKey) && audioElement.src) return track;
      audioCandidateIndex = 0;
      currentAudioKey = track.audioSources[audioCandidateIndex] || track.src;
      audioReady = false;
      audioElement.src = currentAudioKey;
      audioElement.load();
      setProgress(0.04);
      app.classList.remove("has-audio");
      app.classList.add("audio-waiting");
      audioStatus.textContent = "正在接入音源";
      return track;
    }
    function syncTrack(album, options = {}) {
      const track = options.previewOnly ? getTrack(album) : loadAudio(album, options);
      const current = audioReady ? audioElement.currentTime : 0;
      nowAlbum.textContent = `当前专辑 · ${album.year}`;
      nowTrack.textContent = track.title;
      nowTime.textContent = `${formatTime(current)} / ${formatTime(audioReady && audioElement.duration ? audioElement.duration : track.duration)}`;
      syncMvStage(album, track);
      setLyricActive(activeTrack % lyricNodes.length, true);

      trackFan.querySelectorAll(".fan-card").forEach((card) => {
        card.classList.toggle("selected", Number(card.dataset.trackIndex) === activeTrack);
      });
      app.classList.toggle("is-playing", playing);
      playControl.textContent = playing ? "暂停" : "播放";
      playControl.setAttribute("aria-pressed", String(playing));
      if (audioReady) {
        if (playing && (options.userGesture || options.autoContinue)) audioElement.play().catch(() => { audioStatus.textContent = "点击播放"; });
        if (!playing) audioElement.pause();
      }
    }
    function moveTrack(delta, userGesture = false, options = {}) {
      const album = albums[active];
      activeTrack = (activeTrack + delta + album.tracks.length) % album.tracks.length;
      currentAudioKey = "";
      playing = true;
      syncTrack(album, { userGesture, autoContinue: options.autoContinue === true });
    }
    function setHoverJumping() {
      app.classList.add("hover-jumping");
      window.clearTimeout(setHoverJumping.timer);
      setHoverJumping.timer = window.setTimeout(() => app.classList.remove("hover-jumping"), 420);
    }
    function clearHoverPreviews() {
      rail.querySelectorAll(".hover-preview").forEach((node) => node.classList.remove("hover-preview"));
      trackFan.querySelectorAll(".hover-preview").forEach((node) => node.classList.remove("hover-preview"));
      app.classList.remove("track-previewing");
    }
    function previewTrack(index) {
      const album = albums[active];
      const next = Math.max(0, Math.min(album.tracks.length - 1, index));
      const track = getTrack(album, next);
      trackFan.querySelectorAll(".fan-card").forEach((card) => {
        card.classList.toggle("hover-preview", Number(card.dataset.trackIndex) === next);
      });
      nowTrack.textContent = track.title;
      nowTime.textContent = `预览 / ${formatTime(track.duration)}`;
      setLyricActive(next % lyricNodes.length, true);
      app.classList.add("track-previewing");
    }
    function restoreTrackPreview() {
      app.classList.remove("track-previewing");
      trackFan.querySelectorAll(".hover-preview").forEach((node) => node.classList.remove("hover-preview"));
      syncTrack(albums[active], { previewOnly: true });
    }
    function chooseTrack(index, userGesture = false) {
      const album = albums[active];
      const next = Math.max(0, Math.min(album.tracks.length - 1, index));
      const sameTrack = next === activeTrack;
      activeTrack = next;
      if (userGesture) currentAudioKey = "";
      playing = userGesture ? true : playing;
      setHoverJumping();
      app.classList.remove("track-previewing");
      syncTrack(album, { userGesture, previewOnly: !userGesture && sameTrack });
    }
    function setCoverMotion(clientX, clientY) {
      const rect = coverCard.getBoundingClientRect();
      const x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      const y = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
      app.style.setProperty("--cover-x", `${(x * 100).toFixed(1)}%`);
      app.style.setProperty("--cover-y", `${(y * 100).toFixed(1)}%`);
      app.style.setProperty("--cover-tilt-y", `${((x - .5) * 3.2).toFixed(2)}deg`);
      app.style.setProperty("--cover-tilt-x", `${((.5 - y) * 3.2).toFixed(2)}deg`);
      app.classList.add("cover-lit");
    }
    function resetCoverMotion() {
      app.style.setProperty("--cover-x", "50%");
      app.style.setProperty("--cover-y", "50%");
      app.style.setProperty("--cover-tilt-x", "0deg");
      app.style.setProperty("--cover-tilt-y", "0deg");
      app.classList.remove("cover-lit");
    }
    function isActiveHoverArea(target) {
      if (!target || typeof target.closest !== "function") return false;
      return Boolean(target.closest(".cover-zone, .mv-zone, .book-track-list, .track-fan, .album-rail, .mini-player, .quick-actions, .nav"));
    }
    function requestBlankReturnCheck(target) {
      blankReturnTarget = target;
      if (blankReturnFrame) return;
      blankReturnFrame = window.requestAnimationFrame(() => {
        blankReturnFrame = 0;
        scheduleBlankReturn(blankReturnTarget);
      });
    }
    function scheduleBlankReturn(target) {
      if (!tracksOpen) return;
      if (isActiveHoverArea(target)) {
        window.clearTimeout(blankHoverTimer);
        app.classList.remove("blank-returning");
        return;
      }
      if (app.classList.contains("blank-returning") && blankHoverTimer) return;
      app.classList.add("blank-returning");
      blankHoverTimer = window.setTimeout(() => {
        clearHoverPreviews();
        setTracksOpen(false);
        app.classList.remove("blank-returning");
        blankHoverTimer = 0;
      }, 240);
    }
    function scheduleAlbumHover(index) {
      if (index === lastAlbumHover) return;
      lastAlbumHover = index;
      window.clearTimeout(albumHoverTimer);
      rail.querySelectorAll(".album-choice").forEach((button) => {
        button.classList.toggle("hover-preview", Number(button.dataset.index) === index);
      });
      albumHoverTimer = window.setTimeout(() => {
        selectAlbum(index, { fromHover: true, openTracks: true });
      }, 95);
    }
    function scheduleTrackHover(index) {
      if (index === lastTrackHover) return;
      lastTrackHover = index;
      window.clearTimeout(trackHoverTimer);
      trackHoverTimer = window.setTimeout(() => previewTrack(index), 55);
    }
    function renderRail() {
      rail.innerHTML = albums.map((album,index) => `<button class="album-choice ${index === active ? "active" : ""} ${favorites.has(album.title) ? "favorite" : ""}" type="button" data-index="${index}" aria-label="切换到 ${album.title}"><img src="${album.cover}" alt="${album.title} 封面" /><span>${album.title}</span><small>${album.year}</small></button>`).join("");
      window.requestAnimationFrame(() => {
        rail.querySelector(".album-choice.active")?.scrollIntoView({ behavior: "auto", inline: "center", block: "nearest" });
      });
    }
    function renderBookTracks(album) {
      if (!bookTrackList) return;
      const rows = album.tracks.map((name, index) => {
        const track = getTrack(album, index);
        return `<button class="book-track-row ${index === activeTrack ? "selected" : ""}" type="button" data-track-index="${index}" style="--i:${index}"><span class="book-no">${String(index + 1).padStart(2, "0")}</span><span class="book-info"><strong>${track.title}</strong><em>${album.title} · ${album.year}</em></span><span class="book-time">${formatTime(track.duration)}</span></button>`;
      }).join("");
      bookTrackList.innerHTML = `<div class="book-track-head"><span>${album.tracks.length} 首歌曲</span><strong>${album.title}</strong></div><div class="book-track-rows">${rows}</div>`;
    }
    function syncBookTrackSelection() {
      if (!bookTrackList) return;
      bookTrackList.querySelectorAll(".book-track-row").forEach((row) => {
        row.classList.toggle("selected", Number(row.dataset.trackIndex) === activeTrack);
      });
    }
    function setBookOpen(open) {
      bookOpen = Boolean(open);
      app.classList.toggle("book-open", bookOpen);
      coverCard.setAttribute("aria-expanded", String(bookOpen));
      if (bookOpen) renderBookTracks(albums[active]);
      syncBookTrackSelection();
    }
    function toggleBook() {
      setBookOpen(!bookOpen);
    }
    function renderFan(album) {
      lastTrackHover = -1;
      trackFan.dataset.density = "none";
      trackFan.setAttribute("aria-hidden", "true");
      trackFan.innerHTML = "";
      renderBookTracks(album);
      syncTrack(album, { previewOnly: true });
    }
    function updateAlbum(album) {
      activeTrack = 0;
      currentAudioKey = "";
      app.style.setProperty("--cover", `url("${album.cover}")`);
      app.style.setProperty("--glow-a", album.glow[0]);
      app.style.setProperty("--glow-b", album.glow[1]);
      app.style.setProperty("--glow-c", album.glow[2]);
      mainCover.src = album.cover;
      mainCover.alt = `${album.title} 专辑封面`;
      title.innerHTML = album.display;
      lyricNodes.forEach((node, lyricIndex) => { node.textContent = album.lyric[lyricIndex]; });
      renderFan(album);
      syncFavorite(album);
    }
    function restartCoverHandoff(previousCover) {
      coverGhost.src = previousCover;
      app.style.setProperty("--echo", `url("${previousCover}")`);
      app.classList.remove("switching");
      void coverGhost.offsetWidth;
      app.classList.add("switching");
    }
    function replayFan() { setTracksOpen(true, true); }
    function selectAlbum(index, options = {}) {
      const next = (index + albums.length) % albums.length;
      const fromHover = options.fromHover === true;
      if (next === active) {
        if (fromHover) return;
        app.classList.add("cover-lit");
        window.clearTimeout(selectAlbum.sameTimer);
        selectAlbum.sameTimer = window.setTimeout(() => app.classList.remove("cover-lit"), 520);
        return;
      }
      const previousCover = albums[active].cover;
      active = next;
      const switchToken = ++albumSwitchToken;
      setHoverJumping();
      restartCoverHandoff(previousCover);
      updateAlbum(albums[active]);
      window.clearTimeout(selectAlbum.timer);
      selectAlbum.timer = window.setTimeout(() => {
        if (switchToken !== albumSwitchToken) return;
        app.classList.remove("switching");
      }, 680);
    }
    rail.addEventListener("click", (event) => { const button = event.target.closest(".album-choice"); if (!button) return; selectAlbum(Number(button.dataset.index), { openTracks: true }); });
    rail.addEventListener("pointerover", (event) => {
      if (event.pointerType === "touch") return;
      const button = event.target.closest(".album-choice");
      if (!button) return;
      scheduleAlbumHover(Number(button.dataset.index));
    });
    rail.addEventListener("pointerleave", () => {
      lastAlbumHover = -1;
      window.clearTimeout(albumHoverTimer);
      rail.querySelectorAll(".hover-preview").forEach((button) => button.classList.remove("hover-preview"));
    });
    rail.addEventListener("focusin", (event) => {
      const button = event.target.closest(".album-choice");
      if (!button) return;
      scheduleAlbumHover(Number(button.dataset.index));
    });
    trackFan.addEventListener("pointerover", (event) => {
      if (event.pointerType === "touch") return;
      const card = event.target.closest(".fan-card");
      if (!card) return;
      scheduleTrackHover(Number(card.dataset.trackIndex));
    });
    trackFan.addEventListener("pointerleave", () => {
      lastTrackHover = -1;
      window.clearTimeout(trackHoverTimer);
      restoreTrackPreview();
    });
    trackFan.addEventListener("focusin", (event) => {
      const card = event.target.closest(".fan-card");
      if (!card) return;
      scheduleTrackHover(Number(card.dataset.trackIndex));
    });
    document.addEventListener("pointermove", (event) => {
      if (event.pointerType === "touch") return;
      requestBlankReturnCheck(event.target);
    }, { passive: true });
    document.addEventListener("pointerleave", () => {
      if (!tracksOpen) return;
      window.clearTimeout(blankHoverTimer);
      blankHoverTimer = window.setTimeout(() => setTracksOpen(false), 180);
    });
    coverCard.addEventListener("pointermove", (event) => {
      if (event.pointerType === "touch") return;
      setCoverMotion(event.clientX, event.clientY);
    }, { passive: true });
    coverCard.addEventListener("pointerleave", resetCoverMotion);
    mainCover.addEventListener("pointerenter", (event) => {
      if (event.pointerType === "touch") return;
      app.classList.add("cover-lit");
    });
    trackFan.addEventListener("click", (event) => {
      const card = event.target.closest(".fan-card");
      if (!card) return;
      chooseTrack(Number(card.dataset.trackIndex), true);
    });
    bookTrackList.addEventListener("click", (event) => {
      const row = event.target.closest(".book-track-row");
      if (!row) return;
      chooseTrack(Number(row.dataset.trackIndex), true);
    });
    function toggleCoverPlayback(event) {
      event?.stopPropagation();
      playing = !playing;
      syncTrack(albums[active], { userGesture: playing, previewOnly: !playing });
    }
    mvPlayControl?.addEventListener("click", toggleMvPlayback);
    mvVideo?.addEventListener("loadedmetadata", () => {
      mvReady = true;
      app.classList.add("has-mv");
      mvState.textContent = "本地 MV";
    });
    mvVideo?.addEventListener("error", () => {
      const sources = getMvSources(albums[active], activeTrack);
      if (mvCandidateIndex < sources.length - 1) {
        mvCandidateIndex += 1;
        mvVideo.dataset.src = sources[mvCandidateIndex];
        mvVideo.src = sources[mvCandidateIndex];
        mvVideo.load();
        mvState.textContent = "尝试其他 MV 格式";
        return;
      }
      mvReady = false;
      app.classList.remove("has-mv");
      mvState.textContent = "MV 待接入";
    });
    coverPlayControl.addEventListener("click", toggleCoverPlayback);
    coverPlayerProgress.addEventListener("click", (event) => {
      event.stopPropagation();
      if (!audioReady || !audioElement.duration) return;
      const rect = coverPlayerProgress.getBoundingClientRect();
      const ratio = (event.clientX - rect.left) / rect.width;
      audioElement.currentTime = Math.max(0, Math.min(audioElement.duration, ratio * audioElement.duration));
    });
    document.querySelector(".cover-player-info")?.addEventListener("click", (event) => event.stopPropagation());
    playControl.addEventListener("click", toggleCoverPlayback);
    prevTrack.addEventListener("click", () => moveTrack(-1, true));
    nextTrack.addEventListener("click", () => moveTrack(1, true));
    progressLine.addEventListener("click", (event) => {
      if (!audioReady || !audioElement.duration) return;
      const rect = progressLine.getBoundingClientRect();
      const ratio = (event.clientX - rect.left) / rect.width;
      audioElement.currentTime = Math.max(0, Math.min(audioElement.duration, ratio * audioElement.duration));
    });
    audioElement.addEventListener("canplay", () => {
      audioReady = true;
      app.classList.add("has-audio");
      app.classList.remove("audio-waiting");
      audioStatus.textContent = "本地音源";
      if (playing) audioElement.play().catch(() => { audioStatus.textContent = "点击播放"; });
      syncTrack(albums[active], { previewOnly: true });
    });
    audioElement.addEventListener("error", () => {
      const track = getTrack(albums[active], activeTrack);
      if (playing && audioCandidateIndex < track.audioSources.length - 1) {
        audioCandidateIndex += 1;
        currentAudioKey = track.audioSources[audioCandidateIndex];
        audioElement.src = currentAudioKey;
        audioElement.load();
        audioStatus.textContent = "尝试其他音源格式";
        return;
      }
      audioReady = false;
      app.classList.remove("has-audio");
      app.classList.add("audio-waiting");
      audioStatus.textContent = "音源待接入";
      setProgress(0.04);
    });
    audioElement.addEventListener("timeupdate", () => {
      if (!audioReady || !audioElement.duration) return;
      setProgress(audioElement.currentTime / audioElement.duration);
      const liveTime = `${formatTime(audioElement.currentTime)} / ${formatTime(audioElement.duration)}`;
      nowTime.textContent = liveTime;
      coverPlayerTime.textContent = liveTime;
    });
    audioElement.addEventListener("ended", () => moveTrack(1, false, { autoContinue: true }));
    nav.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-view]");
      if (!button) return;
      handleNav(button.dataset.view);
    });
    replayCover.addEventListener("click", toggleTracks);
    favoriteBtn.addEventListener("click", () => {
      const album = albums[active];
      if (favorites.has(album.title)) favorites.delete(album.title);
      else favorites.add(album.title);
      syncFavorite(album);
    });
    coverCard.addEventListener("click", () => toggleBook());
    coverCard.addEventListener("keydown", (event) => {
      if (event.target.closest(".cover-player")) return;
      if (event.key !== "Enter" && event.key !== " ") return;
      event.preventDefault();
      toggleBook();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      if (bookOpen) setBookOpen(false);
      if (tracksOpen) setTracksOpen(false);
    });
    preloadCovers();
    startLyricFlow();
    updateAlbum(albums[active]);
  </script>
</body>
</html>
